<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hissimulation</title>

    <link rel="stylesheet" href="style.css">

    <style>

        /* button styling */
        .btn-primary,
        .btn-secondary,
        .btn-tertiary {
            all: unset;

            display: grid;
            place-content: center;

            background-color: transparent;
            color: rgb(4, 49, 63);

            font-size: 16px;

            cursor: pointer;

            font: inherit;
            font-weight: 500;

            padding: 0.5rem 1rem;

            cursor: pointer;

            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .btn-primary:hover,
        .btn-secondary:hover {
            background-color: rgb(226, 239, 244);
        }

        .btn-tertiary {
            font-size: 0.8rem;
            border: none;
            padding: 0.5rem 0rem;
        }

        .btn-tertiary:hover {
            color: lightblue;
        }

        .btn-primary:active,
        .btn-secondary:active {
            background-color: slategray;
            color: white;

        }

        .pushed {
            background-color: lightcyan;
        }
    </style>

    <script src="three.min.js"></script>
    <script src="scene.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <!-- 3D Canvas -->
    <canvas id="three-canvas"></canvas>

    <!-- UI Overlay -->
    <div class="overlay">
        <div class="overlay-left">
            <h1>Simulation: Hiss</h1>
            <div class="cabin-stack">
                <div class="cabin" data-car="a">
                    <span class="caption">Inre panel — Hiss A</span>
                    <div class="floor-indicator">
                        <span class="floor-number" data-car="a">1</span>
                        <span class="floor-direction" data-car="a">–</span>
                    </div>
                    <div class="panel" data-car="a">
                        <button class="btn-secondary" data-car="a" data-floor="9">9</button>
                        <button class="btn-secondary" data-car="a" data-floor="10">10</button>
                        <button class="btn-secondary" data-car="a" data-floor="7">7</button>
                        <button class="btn-secondary" data-car="a" data-floor="8">8</button>
                        <button class="btn-secondary" data-car="a" data-floor="5">5</button>
                        <button class="btn-secondary" data-car="a" data-floor="6">6</button>
                        <button class="btn-secondary" data-car="a" data-floor="3">3</button>
                        <button class="btn-secondary" data-car="a" data-floor="4">4</button>
                        <button class="btn-secondary" data-car="a" data-floor="1">1</button>
                        <button class="btn-secondary" data-car="a" data-floor="2">2</button>
                    </div>
                </div>
                <div class="cabin" data-car="b">
                    <span class="caption">Inre panel — Hiss B</span>
                    <div class="floor-indicator">
                        <span class="floor-number" data-car="b">1</span>
                        <span class="floor-direction" data-car="b">–</span>
                    </div>
                    <div class="panel" data-car="b">
                        <button class="btn-secondary" data-car="b" data-floor="9">9</button>
                        <button class="btn-secondary" data-car="b" data-floor="10">10</button>
                        <button class="btn-secondary" data-car="b" data-floor="7">7</button>
                        <button class="btn-secondary" data-car="b" data-floor="8">8</button>
                        <button class="btn-secondary" data-car="b" data-floor="5">5</button>
                        <button class="btn-secondary" data-car="b" data-floor="6">6</button>
                        <button class="btn-secondary" data-car="b" data-floor="3">3</button>
                        <button class="btn-secondary" data-car="b" data-floor="4">4</button>
                        <button class="btn-secondary" data-car="b" data-floor="1">1</button>
                        <button class="btn-secondary" data-car="b" data-floor="2">2</button>
                    </div>
                </div>
            </div>
            <div>
                <!-- Debug display för hissen -->
                <div class="caption-layout">
                    <span class="caption">Meddelanden</span>
                    <button class="btn-tertiary" id="btn-reset-display">Sudda</button>
                </div>
                <span class="elevator-display"></span>
            </div>
        </div>

        <div class="overlay-right">
            <span class="caption">Våningsknappar</span>
            <div class="floors">
                <!-- Kallknappar på varje våning (upp/ned). Badge visar vilken hiss (A/B) som tilldelats anropet. -->
                <div class="floor">
                    <span>Våning 10</span>
                    <div class="call-buttons">
                        <span class="call-placeholder"></span>
                        <span class="assigned-badge" data-floor="10" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="10" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 9</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="9" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="9" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="9" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="9" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 8</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="8" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="8" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="8" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="8" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 7</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="7" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="7" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="7" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="7" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 6</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="6" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="6" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="6" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="6" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 5</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="5" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="5" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="5" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="5" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 4</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="4" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="4" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="4" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="4" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 3</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="3" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="3" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="3" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="3" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 2</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="2" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="2" data-direction="up">▲</button>
                        <span class="assigned-badge" data-floor="2" data-direction="down"></span>
                        <button class="btn-secondary" data-floor="2" data-direction="down">▼</button>
                    </div>
                </div>
                <div class="floor">
                    <span>Våning 1</span>
                    <div class="call-buttons">
                        <span class="assigned-badge" data-floor="1" data-direction="up"></span>
                        <button class="btn-secondary" data-floor="1" data-direction="up">▲</button>
                        <span class="call-placeholder"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden elevator shafts — script.js mutates style/class on these so scene.js can mirror them. -->
    <div class="elevator-shaft-hidden">
        <div class="elevator-shaft">
            <div id="elevator-a" class="elevator" data-car="a">
                <div class="door door-left open" data-car="a"></div>
                <div class="door door-right open" data-car="a"></div>
            </div>
        </div>
        <div class="elevator-shaft">
            <div id="elevator-b" class="elevator" data-car="b">
                <div class="door door-left open" data-car="b"></div>
                <div class="door door-right open" data-car="b"></div>
            </div>
        </div>
    </div>
</body>

</html>
